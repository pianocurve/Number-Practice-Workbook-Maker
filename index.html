<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>すうじのれんしゅうちょうメーカー</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'BIZ UDPGothic', 'Hiragino Sans', 'Meiryo', sans-serif;
      background-color: #f8fafc;
    }

    .a4-preview-sheet {
      width: 100%;
      max-width: 800px;
      height: auto;
      aspect-ratio: 210 / 297;
      background-color: #ffffff;
      padding: 12mm 10mm;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      margin: 0 auto;
      box-sizing: border-box;
      position: relative;
    }

    .grid-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .grid-table td {
      width: calc(100% / 11);
      position: relative;
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }

    /* 1:1 正方形セル */
    .grid-table td::after {
      content: "";
      display: block;
      padding-bottom: 100%;
    }

    .cell-inner {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    .editor-canvas-container {
      position: relative;
      width: 100%;
      max-width: 360px;
      aspect-ratio: 1 / 1;
      background-color: #ffffff;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
    }

    .tab-btn.active {
      background-color: #4f46e5;
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);
    }
  </style>
</head>

        </div>
      </div>

    <span id="toast-icon">✨</span>
    <span id="toast-text">設定を更新しました</span>

  <main class="flex-1 max-w-7xl mx-auto w-full p-4 lg:p-6 flex flex-col lg:flex-row gap-6 items-start justify-center">
    
    <!-- エディタセクション -->
    <section class="w-full lg:w-[400px] bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex flex-col gap-5 shrink-0">
      <div>
        <h2 class="font-bold text-slate-900 text-base flex items-center gap-2 border-b pb-2 mb-3">

        </h2>
        <p class="text-xs text-slate-500 leading-relaxed mb-4">
          数字のタブを選択し、線のカーブ（●や○）を調整してください。<br>
          <span class="font-bold text-yellow-600">■をドラッグで矢印の位置を、黄色の●で矢印の向きを調整できます。</span>
        </p>
      </div>

      <div class="grid grid-cols-6 gap-1" id="digit-tabs-container"></div>

      <div class="flex justify-center my-1">
        <div class="editor-canvas-container">

            <line x1="50" y1="0" x2="50" y2="100" stroke="#f1f5f9" stroke-width="1" />
            <line x1="0" y1="50" x2="100" y2="50" stroke="#cbd5e1" stroke-width="0.8" stroke-dasharray="3,3" />

    let digits = structuredClone(INITIAL_DIGITS);
    let selectedDigit = '1';
    let draggingInfo = null;

    // 行の設定（スケールと線の太さ）
    const rowsConfig = Array.from({ length: CONFIG.TOTAL_ROWS }, (_, r) => {
      if (r < 5) {
        return { scale: 1.0, traceScale: [3.0, 2.5, 2.0, 1.5, 1.0][r] };
      } else if (r < 10) {
        return { scale: 2/3, traceScale: [2.0, 1.7, 1.4, 1.1, 0.8][r - 5] };
      } else {
        return { scale: 1/2, traceScale: [1.5, 1.3, 1.1, 0.9, 0.7][r - 10] };
      }
    });

    // --- 共通ユーティリティ関数 ---
    function makePathData(stroke, mapper = (p) => p) {
      if (!stroke || stroke.length === 0) return '';
      const start = mapper(stroke[0]);
      let d = `M ${start.x} ${start.y}`;
      for (let i = 1; i < stroke.length; i++) {
        const prev = stroke[i - 1];
        const curr = stroke[i];
        const cp1 = mapper(prev.hOut ? prev.hOut : prev);
        const cp2 = mapper(curr.hIn ? curr.hIn : curr);
        const end = mapper(curr);
        d += ` C ${cp1.x} ${cp1.y}, ${cp2.x} ${cp2.y}, ${end.x} ${end.y}`;
      }
      return d;
    }

    function createSvgElement(tag, attrs = {}) {
      const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
      for (const [k, v] of Object.entries(attrs)) {
        el.setAttribute(k, v);
      }
      return el;
    }

    // --- UIテキストの初期化 ---
    function initTexts() {
      document.getElementById('sheet-title-display').textContent = CONFIG.TITLE;
      document.getElementById('sheet-subtitle-display').textContent = CONFIG.SUBTITLE;
      document.getElementById('sheet-class-display').textContent = CONFIG.CLASS_LABEL;
      document.getElementById('sheet-name-display').textContent = CONFIG.NAME_LABEL;
    }

    // --- タブ＆エディタ関連 ---
    const digitTabsContainer = document.getElementById('digit-tabs-container');
    const editorPathsG = document.getElementById('editor-paths');
    const editorControlsG = document.getElementById('editor-controls');
    const worksheetTable = document.getElementById('worksheet-table');

    function createDigitTabs() {
      digitTabsContainer.innerHTML = '';
      CONFIG.DIGIT_ORDER.forEach(num => {
        const btn = document.createElement('button');
        btn.className = `tab-btn py-2 text-sm font-bold rounded-lg border transition-all ${num === selectedDigit ? 'active' : 'bg-slate-50 hover:bg-slate-100 text-slate-700 border-slate-200'}`;
        btn.textContent = num;
        btn.addEventListener('click', () => {
          selectedDigit = num;
          document.querySelectorAll('.tab-btn').forEach(b => {
            const isActive = b.textContent === selectedDigit;
            b.className = `tab-btn py-2 text-sm font-bold rounded-lg border transition-all ${isActive ? 'active' : 'bg-slate-50 hover:bg-slate-100 text-slate-700 border-slate-200'}`;
          });
          renderEditor();
        });
        digitTabsContainer.appendChild(btn);
      });
    }

    function renderEditor() {
      editorPathsG.innerHTML = '';
      editorControlsG.innerHTML = '';

      const digitData = digits[selectedDigit];

      // パス描画
      digitData.strokes.forEach(stroke => {
        const d = makePathData(stroke);
        const outer = createSvgElement('path', { d, fill: 'none', stroke: '#e2e8f0', 'stroke-width': '10', 'stroke-linecap': 'round', 'stroke-linejoin': 'round' });
        const inner = createSvgElement('path', { d, fill: 'none', stroke: '#6366f1', 'stroke-width': '3', 'stroke-linecap': 'round', 'stroke-linejoin': 'round' });
        editorPathsG.appendChild(outer);
        editorPathsG.appendChild(inner);
      });

      // コントロールポイント描画
      digitData.strokes.forEach((stroke, sIdx) => {
        stroke.forEach((pt, pIdx) => {
          const anchor = createSvgElement('circle', { cx: pt.x, cy: pt.y, r: '4', fill: '#f43f5e', stroke: '#ffffff', 'stroke-width': '1.5', class: 'cursor-move' });
          anchor.addEventListener('mousedown', (e) => startDrag(e, sIdx, pIdx, 'anchor'));
          anchor.addEventListener('touchstart', (e) => startDrag(e, sIdx, pIdx, 'anchor'));
          editorControlsG.appendChild(anchor);

          if (pt.hIn && pIdx > 0) {
            const line = createSvgElement('line', { x1: pt.x, y1: pt.y, x2: pt.hIn.x, y2: pt.hIn.y, stroke: '#3b82f6', 'stroke-width': '0.8', 'stroke-dasharray': '2,2' });
            const ctrl = createSvgElement('circle', { cx: pt.hIn.x, cy: pt.hIn.y, r: '3', fill: '#ffffff', stroke: '#3b82f6', 'stroke-width': '1.5', class: 'cursor-move' });
            ctrl.addEventListener('mousedown', (e) => startDrag(e, sIdx, pIdx, 'hIn'));
            ctrl.addEventListener('touchstart', (e) => startDrag(e, sIdx, pIdx, 'hIn'));
            editorControlsG.appendChild(line);
            editorControlsG.appendChild(ctrl);
          }

          if (pt.hOut && pIdx < stroke.length - 1) {
            const line = createSvgElement('line', { x1: pt.x, y1: pt.y, x2: pt.hOut.x, y2: pt.hOut.y, stroke: '#10b981', 'stroke-width': '0.8', 'stroke-dasharray': '2,2' });
            const ctrl = createSvgElement('circle', { cx: pt.hOut.x, cy: pt.hOut.y, r: '3', fill: '#ffffff', stroke: '#10b981', 'stroke-width': '1.5', class: 'cursor-move' });
            ctrl.addEventListener('mousedown', (e) => startDrag(e, sIdx, pIdx, 'hOut'));
            ctrl.addEventListener('touchstart', (e) => startDrag(e, sIdx, pIdx, 'hOut'));
            editorControlsG.appendChild(line);
            editorControlsG.appendChild(ctrl);
          }
        });
      });

      // 矢印ハンドル描画
      if (digitData.arrows) {
        digitData.arrows.forEach((arr, aIdx) => {
          const arrowText = createSvgElement('text', {
            x: arr.x, y: arr.y, 'font-size': '14', 'font-weight': 'bold', 'font-family': 'sans-serif',
            fill: '#1e293b', 'text-anchor': 'middle', 'dominant-baseline': 'central',
            transform: `rotate(${arr.angle} ${arr.x} ${arr.y})`, 'pointer-events': 'none'
          });
          arrowText.textContent = '→';
          editorControlsG.appendChild(arrowText);

          const posH = createSvgElement('rect', {
            x: arr.x - 5, y: arr.y - 5, width: '10', height: '10',
            fill: 'rgba(234, 179, 8, 0.4)', stroke: '#ca8a04', 'stroke-width': '1.5', class: 'cursor-move'
          });
          posH.addEventListener('mousedown', (e) => startDrag(e, null, aIdx, 'arrowPos'));
          posH.addEventListener('touchstart', (e) => startDrag(e, null, aIdx, 'arrowPos'));
          editorControlsG.appendChild(posH);

          const dist = 16;
          const rad = arr.angle * Math.PI / 180;
          const ax = arr.x + Math.cos(rad) * dist;
          const ay = arr.y + Math.sin(rad) * dist;

          const angLine = createSvgElement('line', { x1: arr.x, y1: arr.y, x2: ax, y2: ay, stroke: '#ca8a04', 'stroke-width': '1' });
          const angH = createSvgElement('circle', { cx: ax, cy: ay, r: '3.5', fill: '#fef08a', stroke: '#ca8a04', 'stroke-width': '1.5', class: 'cursor-move' });
          angH.addEventListener('mousedown', (e) => startDrag(e, null, aIdx, 'arrowAngle'));
          angH.addEventListener('touchstart', (e) => startDrag(e, null, aIdx, 'arrowAngle'));
          editorControlsG.appendChild(angLine);
          editorControlsG.appendChild(angH);
        });
      }
    }

    function startDrag(e, strokeIdx, ptIdx, nodeType) {
      draggingInfo = { strokeIdx, ptIdx, nodeType };
      e.stopPropagation();
      e.preventDefault();
    }

    function onDrag(e) {
      if (!draggingInfo) return;

      const svg = document.getElementById('editor-svg');
      const rect = svg.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;

      let localX = Math.round(Math.max(5, Math.min(95, ((clientX - rect.left) / rect.width) * 100)));
      let localY = Math.round(Math.max(5, Math.min(95, ((clientY - rect.top) / rect.height) * 100)));

      const digitData = digits[selectedDigit];

      if (draggingInfo.nodeType.startsWith('arrow')) {
        const arr = digitData.arrows[draggingInfo.ptIdx];
        if (draggingInfo.nodeType === 'arrowPos') {
          arr.x = localX;
          arr.y = localY;
        } else if (draggingInfo.nodeType === 'arrowAngle') {
          const dx = localX - arr.x;
          const dy = localY - arr.y;
          arr.angle = Math.atan2(dy, dx) * (180 / Math.PI);
        }
      } else {
        const pt = digitData.strokes[draggingInfo.strokeIdx][draggingInfo.ptIdx];
        if (draggingInfo.nodeType === 'anchor') {
          const dx = localX - pt.x;
          const dy = localY - pt.y;
          pt.x = localX;
          pt.y = localY;
          if (pt.hIn) { pt.hIn.x += dx; pt.hIn.y += dy; }
          if (pt.hOut) { pt.hOut.x += dx; pt.hOut.y += dy; }
        } else if (draggingInfo.nodeType === 'hIn') {
          pt.hIn.x = localX; pt.hIn.y = localY;
        } else if (draggingInfo.nodeType === 'hOut') {
          pt.hOut.x = localX; pt.hOut.y = localY;
        }
      }

      renderEditor();
      renderWorksheet();
    }

    function endDrag() {
      draggingInfo = null;
    }

    window.addEventListener('mousemove', onDrag);
    window.addEventListener('mouseup', endDrag);
    window.addEventListener('touchmove', onDrag, { passive: false });
    window.addEventListener('touchend', endDrag);

    // --- プレビュー生成 ---
    function renderWorksheet() {
      worksheetTable.innerHTML = '';

      for (let r = 0; r < CONFIG.TOTAL_ROWS; r++) {
        const tr = document.createElement('tr');
        const config = rowsConfig[r];

        CONFIG.DIGIT_ORDER.forEach(num => {
          const td = document.createElement('td');
          const innerDiv = document.createElement('div');
          innerDiv.className = 'cell-inner flex justify-center items-center';

          const svg = createSvgElement('svg', { viewBox: '0 0 100 100', style: 'width: 100%; height: 100%; display: block;' });

          const scale = config.scale;
          const size = 100 * scale;
          const offset = (100 - size) / 2;

          // 枠線・ガイド線
          svg.appendChild(createSvgElement('rect', { x: offset, y: offset, width: size, height: size, fill: 'none', stroke: '#a4c2f4', 'stroke-width': '1.2' }));
          
          const dashLen = 2 * scale;
          svg.appendChild(createSvgElement('line', { x1: offset, y1: 50, x2: offset + size, y2: 50, stroke: '#cbd5e1', 'stroke-width': '0.6', 'stroke-dasharray': `${dashLen},${dashLen}` }));
          svg.appendChild(createSvgElement('line', { x1: 50, y1: offset, x2: 50, y2: offset + size, stroke: '#cbd5e1', 'stroke-width': '0.6', 'stroke-dasharray': `${dashLen},${dashLen}` }));

          // ブロックの最後の行(5, 10, 15段目)以外に文字と矢印を表示
          if ((r + 1) % 5 !== 0) {
            const dData = digits[num];
            if (dData && dData.strokes) {
              const mapPt = (p) => ({
                x: offset + (p.x / 100) * size,
                y: offset + (p.y / 100) * size
              });

              dData.strokes.forEach(stroke => {
                const d = makePathData(stroke, mapPt);
                if (d) {
                  const strokePath = createSvgElement('path', {
                    d, fill: 'none', stroke: '#475569',
                    'stroke-width': 7 * config.traceScale,
                    'stroke-linecap': 'round', 'stroke-linejoin': 'round',
                    opacity: CONFIG.UNIFIED_OPACITY
                  });
                  svg.appendChild(strokePath);
                }
              });

              if (r === 0 && dData.arrows) {
                dData.arrows.forEach(arr => {
                  const pt = mapPt(arr);
                  const arrowText = createSvgElement('text', {
                    x: pt.x, y: pt.y, 'font-size': `${14 * scale}`, 'font-weight': 'bold',
                    'font-family': 'sans-serif', fill: '#1e293b', 'text-anchor': 'middle',
                    'dominant-baseline': 'central', transform: `rotate(${arr.angle} ${pt.x} ${pt.y})`
                  });
                  arrowText.textContent = '→';
                  svg.appendChild(arrowText);
                });
              }
            }
          }

          innerDiv.appendChild(svg);
          td.appendChild(innerDiv);
          tr.appendChild(td);
        });

        worksheetTable.appendChild(tr);
      }
    }

    // --- 高解像度PNG保存 (Canvas描画) ---
    function generateHighResPNG() {
      const canvas = document.getElementById('export-canvas');
      const ctx = canvas.getContext('2d');

      const canvasWidth = 2480;
      const canvasHeight = 3508;
      canvas.width = canvasWidth;
      canvas.height = canvasHeight;

      // 背景色
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvasWidth, canvasHeight);

      // タイトル・サブタイトル・ヘッダー（共通テキスト定数を利用）
      ctx.fillStyle = '#1e293b';
      ctx.font = 'bold 85px "BIZ UDPGothic", "Hiragino Sans", "Meiryo", sans-serif';
      ctx.fillText(CONFIG.TITLE, 120, 200);

      ctx.fillStyle = '#64748b';
      ctx.font = 'bold 32px "BIZ UDPGothic", "Hiragino Sans", sans-serif';
      ctx.fillText(CONFIG.SUBTITLE, 120, 260);

      ctx.fillStyle = '#334155';
      ctx.font = 'bold 36px "BIZ UDPGothic", sans-serif';
      ctx.fillText(CONFIG.CLASS_LABEL, 1350, 240);
      ctx.fillText(CONFIG.NAME_LABEL, 1800, 240);

      ctx.beginPath();
      ctx.strokeStyle = '#1e293b';
      ctx.lineWidth = 4;
      ctx.moveTo(120, 310);
      ctx.lineTo(2360, 310);
      ctx.stroke();

      const gridLeft = 120;
      const gridTop = 360;
      const gridWidth = 2240;
      const colWidth = gridWidth / 11;
      const rowHeight = colWidth;

      // グリッド線描画
      const largeRows = 5;
      for (let r = 0; r <= largeRows; r++) {
        ctx.beginPath();
        ctx.strokeStyle = '#a4c2f4';
        ctx.lineWidth = (r === 0 || r === largeRows) ? 5 : 3;
        ctx.moveTo(gridLeft, gridTop + r * rowHeight);
        ctx.lineTo(gridLeft + gridWidth, gridTop + r * rowHeight);
        ctx.stroke();
      }
      for (let c = 0; c <= 11; c++) {
        ctx.beginPath();
        ctx.strokeStyle = '#a4c2f4';
        ctx.lineWidth = (c === 0 || c === 11) ? 5 : 3;
        ctx.moveTo(gridLeft + c * colWidth, gridTop);
        ctx.lineTo(gridLeft + c * colWidth, gridTop + largeRows * rowHeight);
        ctx.stroke();
      }

      for (let r = largeRows; r < CONFIG.TOTAL_ROWS; r++) {
        const config = rowsConfig[r];
        for (let c = 0; c < 11; c++) {
          const cellSize = colWidth * config.scale;
          const offsetX = gridLeft + c * colWidth + (colWidth - cellSize) / 2;
          const offsetY = gridTop + r * rowHeight + (rowHeight - cellSize) / 2;
          ctx.beginPath();
          ctx.strokeStyle = '#a4c2f4';
          ctx.lineWidth = 3;
          ctx.strokeRect(offsetX, offsetY, cellSize, cellSize);
        }
      }

      // セル内描画
      for (let r = 0; r < CONFIG.TOTAL_ROWS; r++) {
        const config = rowsConfig[r];
        const cellSize = colWidth * config.scale;
        
        for (let c = 0; c < 11; c++) {
          const offsetX = gridLeft + c * colWidth + (colWidth - cellSize) / 2;
          const offsetY = gridTop + r * rowHeight + (rowHeight - cellSize) / 2;
          const centerX = offsetX + cellSize / 2;
          const centerY = offsetY + cellSize / 2;

          const dashLen = 12 * config.scale;
          ctx.beginPath();
          ctx.strokeStyle = '#cbd5e1';
          ctx.lineWidth = 2;
          ctx.setLineDash([dashLen, dashLen]);
          ctx.moveTo(offsetX, centerY); ctx.lineTo(offsetX + cellSize, centerY);
          ctx.moveTo(centerX, offsetY); ctx.lineTo(centerX, offsetY + cellSize);
          ctx.stroke();
          ctx.setLineDash([]);

          if ((r + 1) % 5 !== 0) {
            const digitChar = CONFIG.DIGIT_ORDER[c];
            const digitData = digits[digitChar];

            if (digitData && digitData.strokes) {
              const mapPt = (p) => ({
                x: offsetX + (p.x / 100) * cellSize,
                y: offsetY + (p.y / 100) * cellSize
              });

              ctx.save();
              ctx.globalAlpha = CONFIG.UNIFIED_OPACITY;
              ctx.strokeStyle = '#475569';
              ctx.lineWidth = 15 * config.traceScale;
              ctx.lineCap = 'round';
              ctx.lineJoin = 'round';

              digitData.strokes.forEach(stroke => {
                if (stroke.length === 0) return;
                ctx.beginPath();
                const startPt = mapPt(stroke[0]);
                ctx.moveTo(startPt.x, startPt.y);
                for (let i = 1; i < stroke.length; i++) {
                  const prev = stroke[i - 1]; const curr = stroke[i];
                  const cp1 = mapPt(prev.hOut ? prev.hOut : prev);
                  const cp2 = mapPt(curr.hIn ? curr.hIn : curr);
                  const end = mapPt(curr);
                  ctx.bezierCurveTo(cp1.x, cp1.y, cp2.x, cp2.y, end.x, end.y);
                }
                ctx.stroke();
              });
              ctx.restore();

              // 矢印の描画
              if (r === 0 && digitData.arrows) {
                ctx.fillStyle = '#1e293b';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const fontSize = 32 * config.scale; 
                ctx.font = `bold ${fontSize}px sans-serif`;

                digitData.arrows.forEach(arr => {
                  const pt = mapPt(arr);
                  ctx.save();
                  ctx.translate(pt.x, pt.y);
                  ctx.rotate(arr.angle * Math.PI / 180);
                  ctx.fillText('→', 0, 0);
                  ctx.restore();
                });
              }
            }
          }
        }
      }

      // 画像のダウンロード実行
      const dataURL = canvas.toDataURL('image/png');
      const downloadLink = document.createElement('a');
      downloadLink.href = dataURL;
      downloadLink.download = `${CONFIG.TITLE}_A4_15段.png`;
      document.body.appendChild(downloadLink);
      downloadLink.click();
      document.body.removeChild(downloadLink);
    }

    // --- 各種ボタンイベント ---
    document.getElementById('reset-all-btn').addEventListener('click', () => {
      digits = structuredClone(INITIAL_DIGITS);
      renderEditor();
      renderWorksheet();
      showToast('編集した書体を初期状態にリセットしました！', '🔄');
    });

    document.getElementById('download-png-btn').addEventListener('click', () => {
      generateHighResPNG();
      showToast('練習シートのPNG画像を保存しました！', '💾');
    });

    document.getElementById('export-json-btn').addEventListener('click', () => {
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(digits, null, 2));
      const downloadAnchorNode = document.createElement('a');
      downloadAnchorNode.setAttribute("href", dataStr);
      downloadAnchorNode.setAttribute("download", "suuji_bezier_data.json");
      document.body.appendChild(downloadAnchorNode);
      downloadAnchorNode.click();
      downloadAnchorNode.remove();
      showToast('ベジェデータをエクスポートしました！', '📤');
    });

    document.getElementById('import-json-input').addEventListener('change', (event) => {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const importedData = JSON.parse(e.target.result);
          if (importedData['1'] && importedData['2']) {
            if (!importedData['=']) importedData['='] = structuredClone(INITIAL_DIGITS['=']);
            // 矢印データがない古いデータの補正
            Object.keys(importedData).forEach(key => {
              if (importedData[key] && !importedData[key].arrows) {
                importedData[key].arrows = importedData[key].strokes.map(s => ({ x: s[0].x, y: s[0].y, angle: 0 }));
              }
            });
            digits = importedData;
            renderEditor();
            renderWorksheet();
            showToast('データを読み込みました！', '✅');
          } else {
            showToast('無効なデータ形式です。', '⚠️');
          }
        } catch (err) {
          showToast('ファイルの読み込みに失敗しました。', '⚠️');
        }
        event.target.value = '';
      };
      reader.readAsText(file);
    });

    function showToast(message, icon = '✨') {
      const toast = document.getElementById('toast-notification');
      const toastText = document.getElementById('toast-text');
      const toastIcon = document.getElementById('toast-icon');
      
      toastText.textContent = message;
      toastIcon.textContent = icon;
      
      toast.classList.remove('opacity-0', 'pointer-events-none');
      toast.classList.add('opacity-100');
      
      setTimeout(() => {
        toast.classList.remove('opacity-100');
        toast.classList.add('opacity-0', 'pointer-events-none');
      }, 3000);
    }

    // 初期化処理
    window.onload = function() {
      initTexts();
      createDigitTabs();
      renderEditor();
      renderWorksheet();
    };
  </script>
</body>
