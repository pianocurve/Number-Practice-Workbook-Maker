<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>すうじの練習帳メーカー (書き順矢印・段階縮小版)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'BIZ UDPGothic', 'Hiragino Sans', 'Meiryo', sans-serif;
      background-color: #f8fafc;
    }

    .a4-preview-sheet {
      width: 100%;
      max-width: 800px;
      height: auto;
      aspect-ratio: 210 / 297;
      background-color: #ffffff;
      padding: 12mm 10mm;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      margin: 0 auto;
      box-sizing: border-box;
      position: relative;
    }

    .grid-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .grid-table td {
      width: calc(100% / 11);
      position: relative;
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }

    /* Standard technique to force exact aspect-ratio 1:1 squares on grid cells responsive */
    .grid-table td::after {
      content: "";
      display: block;
      padding-bottom: 100%;
    }

    .cell-inner {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    .editor-canvas-container {
      position: relative;
      width: 100%;
      max-width: 360px;
      aspect-ratio: 1 / 1;
      background-color: #ffffff;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
    }

    .tab-btn.active {
      background-color: #4f46e5;
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);
    }
  </style>
</head>

      </div>

      </div>
    </div>
  </header>

  <div id="toast-notification" class="fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-slate-900/95 text-white text-xs px-4 py-2.5 rounded-xl shadow-xl border border-slate-700 opacity-0 pointer-events-none transition-all duration-300 flex items-center gap-2">
    <span id="toast-icon">✨</span>
    <span id="toast-text">設定を更新しました</span>
  </div>

  <main class="flex-1 max-w-7xl mx-auto w-full p-4 lg:p-6 flex flex-col lg:flex-row gap-6 items-start justify-center">
    
    <section class="w-full lg:w-[400px] bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex flex-col gap-5 shrink-0">
      <div>
        <h2 class="font-bold text-slate-900 text-base flex items-center gap-2 border-b pb-2 mb-3">
          <span class="text-indigo-600">🎨</span> 書体を編集する
        </h2>
        <p class="text-xs text-slate-500 leading-relaxed mb-4">
          数字のタブを選択し、線のカーブ（●や○）を調整してください。<br>
          <span class="font-bold text-yellow-600">■をドラッグで矢印の位置を、黄色の●で矢印の向きを調整できます。</span>
        </p>
      </div>

      <div class="grid grid-cols-6 gap-1" id="digit-tabs-container"></div>

      <div class="flex justify-center my-1">
        <div class="editor-canvas-container">
          <svg id="editor-svg" viewBox="0 0 100 100" class="w-full h-full select-none cursor-default">
            <!-- Background grid -->
            <line x1="0" y1="50" x2="100" y2="50" stroke="#f1f5f9" stroke-width="1" />
            <line x1="50" y1="0" x2="50" y2="100" stroke="#f1f5f9" stroke-width="1" />
            <line x1="0" y1="50" x2="100" y2="50" stroke="#cbd5e1" stroke-width="0.8" stroke-dasharray="3,3" />

            <g id="editor-paths"></g>
            <g id="editor-controls"></g>

        </div>
      </div>

      <div class="flex items-center gap-2 mt-1 border-t pt-3">
        <button id="export-json-btn" class="flex-1 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-bold rounded-lg transition-all border border-slate-300 flex items-center justify-center gap-1">

          📥 データを読込
        </label>
        <input type="file" id="import-json-input" accept=".json" class="hidden">
      </div>
    </section>

    <section class="flex-1 w-full bg-slate-200/50 p-4 rounded-2xl flex justify-center items-start overflow-y-auto" style="min-height: 80vh;">
      <div class="a4-preview-sheet shadow-2xl flex flex-col">
        <div class="flex justify-between items-end border-b-2 border-slate-700 pb-2 mb-4 shrink-0" style="font-size: clamp(0.5rem, 1.5vw, 1rem);">
          <div>
            <h2 class="text-[1.5em] font-bold tracking-widest text-slate-800 font-sans leading-none">すうじの れんしゅうちょう</h2>
            <p class="text-[0.6em] text-slate-500 tracking-wider mt-1 font-semibold">ていねいに なぞって、きれいな すうじを かいてみよう！</p>
          </div>
          <div class="text-right text-slate-700 flex items-end gap-1 font-bold text-[0.8em]">
            <div>______ ねん ______ くみ</div>
            <div class="border-b border-slate-800 pb-0.5 px-4 w-[12em] text-left text-slate-700">なまえ（　　　　　　　　　　）</div>

        </div>
        <div class="flex-1 flex flex-col justify-start">
          <table class="grid-table" id="worksheet-table"></table>
        </div>
      </div>
    </section>

  </main>

    let digits = deepClone(INITIAL_DIGITS);
    let selectedDigit = '1';
    
    const digitOrder = ['1', '2', '3', '4', '5', '6', '7', '8', '9', '0', '='];
    const totalRows = 15; 
    const unifiedOpacity = 0.40;

    // サイズ別に太さの開始値を細く調整 (大:3.0~, 中:2.0~, 小:1.5~)
    const rowsConfig = [];
    for (let r = 0; r < totalRows; r++) {
      if (r < 5) {
        rowsConfig.push({ scale: 1.0, traceScale: [3.0, 2.5, 2.0, 1.5, 1.0][r] });
      } else if (r < 10) {
        rowsConfig.push({ scale: 2/3, traceScale: [2.0, 1.7, 1.4, 1.1, 0.8][r - 5] });
      } else {
        rowsConfig.push({ scale: 1/2, traceScale: [1.5, 1.3, 1.1, 0.9, 0.7][r - 10] });
      }
    }

    function makePathData(stroke) {
      if (stroke.length === 0) return '';
      let d = `M ${stroke[0].x} ${stroke[0].y}`;
      for (let i = 1; i < stroke.length; i++) {
        const prev = stroke[i - 1];
        const curr = stroke[i];
        const cp1 = prev.hOut ? prev.hOut : { x: prev.x, y: prev.y };
        const cp2 = curr.hIn ? curr.hIn : { x: curr.x, y: curr.y };
        d += ` C ${cp1.x} ${cp1.y}, ${cp2.x} ${cp2.y}, ${curr.x} ${curr.y}`;
      }
      return d;
    }

    const digitTabsContainer = document.getElementById('digit-tabs-container');
    const editorPathsG = document.getElementById('editor-paths');
    const editorControlsG = document.getElementById('editor-controls');
    const worksheetTable = document.getElementById('worksheet-table');
    const resetAllBtn = document.getElementById('reset-all-btn');
    const downloadPngBtn = document.getElementById('download-png-btn');
    const exportJsonBtn = document.getElementById('export-json-btn');
    const importJsonInput = document.getElementById('import-json-input');

    function createDigitTabs() {
      digitTabsContainer.innerHTML = '';
      digitOrder.forEach(num => {
        const btn = document.createElement('button');
        btn.className = `tab-btn py-2 text-sm font-bold rounded-lg border transition-all ${num === selectedDigit ? 'active' : 'bg-slate-50 hover:bg-slate-100 text-slate-700 border-slate-200'}`;
        btn.textContent = num;
        btn.addEventListener('click', () => {
          selectedDigit = num;
          document.querySelectorAll('.tab-btn').forEach(b => {
            b.classList.remove('active', 'bg-slate-50', 'hover:bg-slate-100', 'text-slate-700', 'border-slate-200');
            if (b.textContent === selectedDigit) b.classList.add('active');
            else b.classList.add('bg-slate-50', 'hover:bg-slate-100', 'text-slate-700', 'border-slate-200');
          });
          renderEditor();
        });
        digitTabsContainer.appendChild(btn);
      });
    }

    let draggingInfo = null;

    function renderEditor() {
      editorPathsG.innerHTML = '';
      editorControlsG.innerHTML = '';

      const digitData = digits[selectedDigit];

      digitData.strokes.forEach(stroke => {
        const d = makePathData(stroke);
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', d);
        path.setAttribute('fill', 'none');
        path.setAttribute('stroke', '#e2e8f0');
        path.setAttribute('stroke-width', '10');
        path.setAttribute('stroke-linecap', 'round');
        path.setAttribute('stroke-linejoin', 'round');
        editorPathsG.appendChild(path);

        const innerPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        innerPath.setAttribute('d', d);
        innerPath.setAttribute('fill', 'none');
        innerPath.setAttribute('stroke', '#6366f1');
        innerPath.setAttribute('stroke-width', '3');
        innerPath.setAttribute('stroke-linecap', 'round');
        innerPath.setAttribute('stroke-linejoin', 'round');
        editorPathsG.appendChild(innerPath);
      });

      digitData.strokes.forEach((stroke, sIdx) => {
        stroke.forEach((pt, pIdx) => {
          const anchor = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          anchor.setAttribute('cx', pt.x);
          anchor.setAttribute('cy', pt.y);
          anchor.setAttribute('r', '4');
          anchor.setAttribute('fill', '#f43f5e');
          anchor.setAttribute('stroke', '#ffffff');
          anchor.setAttribute('stroke-width', '1.5');
          anchor.setAttribute('class', 'cursor-move');
          anchor.addEventListener('mousedown', (e) => startDrag(e, sIdx, pIdx, 'anchor'));
          anchor.addEventListener('touchstart', (e) => startDrag(e, sIdx, pIdx, 'anchor'));
          editorControlsG.appendChild(anchor);

          if (pt.hIn && pIdx > 0) {
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', pt.x); line.setAttribute('y1', pt.y);
            line.setAttribute('x2', pt.hIn.x); line.setAttribute('y2', pt.hIn.y);
            line.setAttribute('stroke', '#3b82f6'); line.setAttribute('stroke-width', '0.8'); line.setAttribute('stroke-dasharray', '2,2');
            editorControlsG.appendChild(line);

            const ctrl = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            ctrl.setAttribute('cx', pt.hIn.x); ctrl.setAttribute('cy', pt.hIn.y);
            ctrl.setAttribute('r', '3'); ctrl.setAttribute('fill', '#ffffff');
            ctrl.setAttribute('stroke', '#3b82f6'); ctrl.setAttribute('stroke-width', '1.5');
            ctrl.setAttribute('class', 'cursor-move');
            ctrl.addEventListener('mousedown', (e) => startDrag(e, sIdx, pIdx, 'hIn'));
            ctrl.addEventListener('touchstart', (e) => startDrag(e, sIdx, pIdx, 'hIn'));
            editorControlsG.appendChild(ctrl);
          }

          if (pt.hOut && pIdx < stroke.length - 1) {
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', pt.x); line.setAttribute('y1', pt.y);
            line.setAttribute('x2', pt.hOut.x); line.setAttribute('y2', pt.hOut.y);
            line.setAttribute('stroke', '#10b981'); line.setAttribute('stroke-width', '0.8'); line.setAttribute('stroke-dasharray', '2,2');
            editorControlsG.appendChild(line);

            const ctrl = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            ctrl.setAttribute('cx', pt.hOut.x); ctrl.setAttribute('cy', pt.hOut.y);
            ctrl.setAttribute('r', '3'); ctrl.setAttribute('fill', '#ffffff');
            ctrl.setAttribute('stroke', '#10b981'); ctrl.setAttribute('stroke-width', '1.5');
            ctrl.setAttribute('class', 'cursor-move');
            ctrl.addEventListener('mousedown', (e) => startDrag(e, sIdx, pIdx, 'hOut'));
            ctrl.addEventListener('touchstart', (e) => startDrag(e, sIdx, pIdx, 'hOut'));
            editorControlsG.appendChild(ctrl);
          }
        });
      });

      if (digitData.arrows) {
        digitData.arrows.forEach((arr, aIdx) => {
          // 1. Text Arrow
          const arrowText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          arrowText.setAttribute('x', arr.x);
          arrowText.setAttribute('y', arr.y);
          arrowText.setAttribute('font-size', '14');
          arrowText.setAttribute('font-weight', 'bold');
          arrowText.setAttribute('font-family', 'sans-serif');
          arrowText.setAttribute('fill', '#1e293b');
          arrowText.setAttribute('text-anchor', 'middle');
          arrowText.setAttribute('dominant-baseline', 'central');
          arrowText.setAttribute('transform', `rotate(${arr.angle} ${arr.x} ${arr.y})`);
          arrowText.setAttribute('pointer-events', 'none');
          arrowText.textContent = '→';
          editorControlsG.appendChild(arrowText);

          // 2. Position handle (Yellow Rect)
          const posH = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
          posH.setAttribute('x', arr.x - 5);
          posH.setAttribute('y', arr.y - 5);
          posH.setAttribute('width', '10');
          posH.setAttribute('height', '10');
          posH.setAttribute('fill', 'rgba(234, 179, 8, 0.4)');
          posH.setAttribute('stroke', '#ca8a04');
          posH.setAttribute('stroke-width', '1.5');
          posH.setAttribute('class', 'cursor-move');
          posH.addEventListener('mousedown', (e) => startDrag(e, null, aIdx, 'arrowPos'));
          posH.addEventListener('touchstart', (e) => startDrag(e, null, aIdx, 'arrowPos'));
          editorControlsG.appendChild(posH);

          // 3. Angle handle (Line + Circle)
          const dist = 16;
          const rad = arr.angle * Math.PI / 180;
          const ax = arr.x + Math.cos(rad) * dist;
          const ay = arr.y + Math.sin(rad) * dist;

          const angLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          angLine.setAttribute('x1', arr.x); angLine.setAttribute('y1', arr.y);
          angLine.setAttribute('x2', ax); angLine.setAttribute('y2', ay);
          angLine.setAttribute('stroke', '#ca8a04'); angLine.setAttribute('stroke-width', '1');
          editorControlsG.appendChild(angLine);

          const angH = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          angH.setAttribute('cx', ax); angH.setAttribute('cy', ay);
          angH.setAttribute('r', '3.5');
          angH.setAttribute('fill', '#fef08a');
          angH.setAttribute('stroke', '#ca8a04');
          angH.setAttribute('stroke-width', '1.5');
          angH.setAttribute('class', 'cursor-move');
          angH.addEventListener('mousedown', (e) => startDrag(e, null, aIdx, 'arrowAngle'));
          angH.addEventListener('touchstart', (e) => startDrag(e, null, aIdx, 'arrowAngle'));
          editorControlsG.appendChild(angH);
        });
      }
    }

    function startDrag(e, strokeIdx, ptIdx, nodeType) {
      draggingInfo = { strokeIdx, ptIdx, nodeType };
      e.stopPropagation();
      e.preventDefault();
    }

    function onDrag(e) {
      if (!draggingInfo) return;

      const svg = document.getElementById('editor-svg');
      const rect = svg.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;

      let localX = ((clientX - rect.left) / rect.width) * 100;
      let localY = ((clientY - rect.top) / rect.height) * 100;

      localX = Math.round(Math.max(5, Math.min(95, localX)));
      localY = Math.round(Math.max(5, Math.min(95, localY)));

      const digitData = digits[selectedDigit];

      if (draggingInfo.nodeType.startsWith('arrow')) {
        const arr = digitData.arrows[draggingInfo.ptIdx];
        if (draggingInfo.nodeType === 'arrowPos') {
          arr.x = localX;
          arr.y = localY;
        } else if (draggingInfo.nodeType === 'arrowAngle') {
          const dx = localX - arr.x;
          const dy = localY - arr.y;
          arr.angle = Math.atan2(dy, dx) * (180 / Math.PI);
        }
      } else {
        const pt = digitData.strokes[draggingInfo.strokeIdx][draggingInfo.ptIdx];
        if (draggingInfo.nodeType === 'anchor') {
          const dx = localX - pt.x;
          const dy = localY - pt.y;
          pt.x = localX;
          pt.y = localY;
          if (pt.hIn) { pt.hIn.x += dx; pt.hIn.y += dy; }
          if (pt.hOut) { pt.hOut.x += dx; pt.hOut.y += dy; }
        } else if (draggingInfo.nodeType === 'hIn') {
          pt.hIn.x = localX; pt.hIn.y = localY;
        } else if (draggingInfo.nodeType === 'hOut') {
          pt.hOut.x = localX; pt.hOut.y = localY;
        }
      }

      renderEditor();
      renderWorksheet();
    }

    function endDrag() {
      draggingInfo = null;
    }

    window.addEventListener('mousemove', onDrag);
    window.addEventListener('mouseup', endDrag);
    window.addEventListener('touchmove', onDrag, { passive: false });
    window.addEventListener('touchend', endDrag);

    function renderWorksheet() {
      worksheetTable.innerHTML = '';

      for (let r = 0; r < totalRows; r++) {
        const tr = document.createElement('tr');
        const config = rowsConfig[r];

        digitOrder.forEach(num => {
          const td = document.createElement('td');
          const innerDiv = document.createElement('div');
          innerDiv.className = 'cell-inner flex justify-center items-center';

          const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
          svg.setAttribute('viewBox', '0 0 100 100');
          svg.style.width = '100%';
          svg.style.height = '100%';
          svg.style.display = 'block';

          const scale = config.scale;
          const size = 100 * scale;
          const offset = (100 - size) / 2;

          
          const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
          rect.setAttribute('x', offset); rect.setAttribute('y', offset);
          rect.setAttribute('width', size); rect.setAttribute('height', size);
          rect.setAttribute('fill', 'none'); rect.setAttribute('stroke', '#a4c2f4');
          rect.setAttribute('stroke-width', '1.2');
          svg.appendChild(rect);
        

          const dashLen = 2 * scale;
          const hLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          hLine.setAttribute('x1', offset); hLine.setAttribute('y1', 50); hLine.setAttribute('x2', offset + size); hLine.setAttribute('y2', 50);
          hLine.setAttribute('stroke', '#cbd5e1'); hLine.setAttribute('stroke-width', '0.6'); hLine.setAttribute('stroke-dasharray', `${dashLen},${dashLen}`);
          svg.appendChild(hLine);

          const vLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          vLine.setAttribute('x1', 50); vLine.setAttribute('y1', offset); vLine.setAttribute('x2', 50); vLine.setAttribute('y2', offset + size);
          vLine.setAttribute('stroke', '#cbd5e1'); vLine.setAttribute('stroke-width', '0.6'); vLine.setAttribute('stroke-dasharray', `${dashLen},${dashLen}`);
          svg.appendChild(vLine);

          // Guide lines & Arrows only appear if it's NOT the last row of the block (5th, 10th, 15th rows)
          if ((r + 1) % 5 !== 0) {
            const dData = digits[num];
            if (dData && dData.strokes) {
              const mapPt = (p) => ({
                x: offset + (p.x / 100) * size,
                y: offset + (p.y / 100) * size
              });

              dData.strokes.forEach(stroke => {
                if (stroke.length === 0) return;
                let d = `M ${mapPt(stroke[0]).x} ${mapPt(stroke[0]).y}`;
                for (let i = 1; i < stroke.length; i++) {
                  const prev = stroke[i - 1]; const curr = stroke[i];
                  const cp1 = mapPt(prev.hOut ? prev.hOut : prev);
                  const cp2 = mapPt(curr.hIn ? curr.hIn : curr);
                  const end = mapPt(curr);
                  d += ` C ${cp1.x} ${cp1.y}, ${cp2.x} ${cp2.y}, ${end.x} ${end.y}`;
                }
                const strokePath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                strokePath.setAttribute('d', d);
                strokePath.setAttribute('fill', 'none');
                strokePath.setAttribute('stroke', '#475569');
                strokePath.setAttribute('stroke-width', 7 * config.traceScale);
                strokePath.setAttribute('stroke-linecap', 'round');
                strokePath.setAttribute('stroke-linejoin', 'round');
                strokePath.setAttribute('opacity', unifiedOpacity);
                svg.appendChild(strokePath);
              });

              if (r==0 && dData.arrows) {
                dData.arrows.forEach(arr => {
                  const pt = mapPt(arr);
                  const arrowText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                  arrowText.setAttribute('x', pt.x);
                  arrowText.setAttribute('y', pt.y);
                  arrowText.setAttribute('font-size', `${14 * scale}`);
                  arrowText.setAttribute('font-weight', 'bold');
                  arrowText.setAttribute('font-family', 'sans-serif');
                  arrowText.setAttribute('fill', '#1e293b');
                  arrowText.setAttribute('text-anchor', 'middle');
                  arrowText.setAttribute('dominant-baseline', 'central');
                  arrowText.setAttribute('transform', `rotate(${arr.angle} ${pt.x} ${pt.y})`);
                  arrowText.textContent = '→';
                  svg.appendChild(arrowText);
                });
              }
            }
          }

          innerDiv.appendChild(svg);
          td.appendChild(innerDiv);
          tr.appendChild(td);
        });

        worksheetTable.appendChild(tr);
      }
    }

    function generateHighResPNG() {
      const canvas = document.getElementById('export-canvas');
      const ctx = canvas.getContext('2d');

      const canvasWidth = 2480;
      const canvasHeight = 3508;
      canvas.width = canvasWidth;
      canvas.height = canvasHeight;

      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvasWidth, canvasHeight);

      ctx.fillStyle = '#1e293b';
      ctx.font = 'bold 85px "BIZ UDPGothic", "Hiragino Sans", "Meiryo", sans-serif';
      ctx.fillText('すうじの れんしゅうちょう', 120, 200);

      ctx.fillStyle = '#64748b';
      ctx.font = 'bold 32px "BIZ UDPGothic", "Hiragino Sans", sans-serif';
      ctx.fillText('ていねいに なぞって、きれいな すうじを かいてみよう！', 120, 260);

      ctx.fillStyle = '#334155';
      ctx.font = 'bold 36px "BIZ UDPGothic", sans-serif';
      ctx.fillText('______ ねん ______ くみ', 1350, 240);
      ctx.fillStyle = '#94a3b8';
      ctx.fillText('なまえ（　　　　　　　　　　　　　　　）', 1800, 240);
      ctx.beginPath();
      ctx.strokeStyle = '#1e293b';
      ctx.lineWidth = 4;
      ctx.moveTo(120, 310);
      ctx.lineTo(2360, 310);
      ctx.stroke();

      const gridLeft = 120;
      const gridTop = 360;
      const gridWidth = 2240;
      const colWidth = gridWidth / 11;
      const rowHeight = colWidth;

      const largeRows = 5;
      for (let r = 0; r <= largeRows; r++) {
        ctx.beginPath();
        ctx.strokeStyle = '#a4c2f4';
        ctx.lineWidth = (r === 0 || r === largeRows) ? 5 : 3;
        ctx.moveTo(gridLeft, gridTop + r * rowHeight);
        ctx.lineTo(gridLeft + gridWidth, gridTop + r * rowHeight);
        ctx.stroke();
      }
      for (let c = 0; c <= 11; c++) {
        ctx.beginPath();
        ctx.strokeStyle = '#a4c2f4';
        ctx.lineWidth = (c === 0 || c === 11) ? 5 : 3;
        ctx.moveTo(gridLeft + c * colWidth, gridTop);
        ctx.lineTo(gridLeft + c * colWidth, gridTop + largeRows * rowHeight);
        ctx.stroke();
      }

      for (let r = largeRows; r < totalRows; r++) {
        const config = rowsConfig[r];
        for (let c = 0; c < 11; c++) {
          const cellSize = colWidth * config.scale;
          const offsetX = gridLeft + c * colWidth + (colWidth - cellSize) / 2;
          const offsetY = gridTop + r * rowHeight + (rowHeight - cellSize) / 2;
          ctx.beginPath();
          ctx.strokeStyle = '#a4c2f4';
          ctx.lineWidth = 3;
          ctx.strokeRect(offsetX, offsetY, cellSize, cellSize);
        }
      }

      for (let r = 0; r < totalRows; r++) {
        const config = rowsConfig[r];
        const cellSize = colWidth * config.scale;
        
        for (let c = 0; c < 11; c++) {
          const offsetX = gridLeft + c * colWidth + (colWidth - cellSize) / 2;
          const offsetY = gridTop + r * rowHeight + (rowHeight - cellSize) / 2;
          const centerX = offsetX + cellSize / 2;
          const centerY = offsetY + cellSize / 2;

          const dashLen = 12 * config.scale;
          ctx.beginPath();
          ctx.strokeStyle = '#cbd5e1';
          ctx.lineWidth = 2;
          ctx.setLineDash([dashLen, dashLen]);
          ctx.moveTo(offsetX, centerY); ctx.lineTo(offsetX + cellSize, centerY);
          ctx.moveTo(centerX, offsetY); ctx.lineTo(centerX, offsetY + cellSize);
          ctx.stroke();
          ctx.setLineDash([]);

          if ((r + 1) % 5 !== 0) {
            const digitChar = digitOrder[c];
            const digitData = digits[digitChar];

            if (digitData && digitData.strokes) {
              const mapPt = (p) => ({
                x: offsetX + (p.x / 100) * cellSize,
                y: offsetY + (p.y / 100) * cellSize
              });

              ctx.save();
              ctx.globalAlpha = unifiedOpacity;
              ctx.strokeStyle = '#475569';
              ctx.lineWidth = 15 * config.traceScale;
              ctx.lineCap = 'round';
              ctx.lineJoin = 'round';

              digitData.strokes.forEach(stroke => {
                if (stroke.length === 0) return;
                ctx.beginPath();
                const startPt = mapPt(stroke[0]);
                ctx.moveTo(startPt.x, startPt.y);
                for (let i = 1; i < stroke.length; i++) {
                  const prev = stroke[i - 1]; const curr = stroke[i];
                  const cp1 = mapPt(prev.hOut ? prev.hOut : prev);
                  const cp2 = mapPt(curr.hIn ? curr.hIn : curr);
                  const end = mapPt(curr);
                  ctx.bezierCurveTo(cp1.x, cp1.y, cp2.x, cp2.y, end.x, end.y);
                }
                ctx.stroke();
              });
              ctx.restore();

              // Draw canvas arrows
              if (r==0 && digitData.arrows) {
                ctx.fillStyle = '#1e293b';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const fontSize = 32 * config.scale; 
                ctx.font = `bold ${fontSize}px sans-serif`;

                digitData.arrows.forEach(arr => {
                  const pt = mapPt(arr);
                  ctx.save();
                  ctx.translate(pt.x, pt.y);
                  ctx.rotate(arr.angle * Math.PI / 180);
                  ctx.fillText('→', 0, 0);
                  ctx.restore();
                });
              }
            }
          }
        }
      }

      const dataURL = canvas.toDataURL('image/png');
      const downloadLink = document.createElement('a');
      downloadLink.href = dataURL;
      downloadLink.download = 'すうじのれんしゅうちょう_A4_15段.png';
      document.body.appendChild(downloadLink);
      downloadLink.click();
      document.body.removeChild(downloadLink);
    }

    resetAllBtn.addEventListener('click', () => {
      digits = deepClone(INITIAL_DIGITS);
      renderEditor();
      renderWorksheet();
      showToast('編集した書体を初期状態にリセットしました！', '🔄');
    });

    downloadPngBtn.addEventListener('click', () => {
      generateHighResPNG();
      showToast('練習シートのPNG画像を保存しました！', '💾');
    });

    exportJsonBtn.addEventListener('click', () => {
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(digits, null, 2));
      const downloadAnchorNode = document.createElement('a');
      downloadAnchorNode.setAttribute("href", dataStr);
      downloadAnchorNode.setAttribute("download", "suuji_bezier_data.json");
      document.body.appendChild(downloadAnchorNode);
      downloadAnchorNode.click();
      downloadAnchorNode.remove();
      showToast('ベジェデータをエクスポートしました！', '📤');
    });

    importJsonInput.addEventListener('change', (event) => {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const importedData = JSON.parse(e.target.result);
          if (importedData['1'] && importedData['2']) {
            if (!importedData['=']) importedData['='] = deepClone(INITIAL_DIGITS['=']);
            // Migrate old data missing arrows
            Object.keys(importedData).forEach(key => {
              if (importedData[key] && !importedData[key].arrows) {
                importedData[key].arrows = importedData[key].strokes.map(s => ({ x: s[0].x, y: s[0].y, angle: 0 }));
              }
            });
            digits = importedData;
            renderEditor();
            renderWorksheet();
            showToast('📥 データを読み込みました！', '✅');
          } else {
            showToast('無効なデータ形式です。', '⚠️');
          }
        } catch (err) {
          showToast('ファイルの読み込みに失敗しました。', '⚠️');
        }
        importJsonInput.value = '';
      };
      reader.readAsText(file);
    });

    function showToast(message, icon = '✨') {
      const toast = document.getElementById('toast-notification');
      const toastText = document.getElementById('toast-text');
      const toastIcon = document.getElementById('toast-icon');
      
      toastText.textContent = message;
      toastIcon.textContent = icon;
      
      toast.classList.remove('opacity-0', 'pointer-events-none');
      toast.classList.add('opacity-100');
      
      setTimeout(() => {
        toast.classList.remove('opacity-100');
        toast.classList.add('opacity-0', 'pointer-events-none');
      }, 3000);
    }

    window.onload = function() {
      createDigitTabs();
      renderEditor();
      renderWorksheet();
    };
  </script>
