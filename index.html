    let digits = structuredClone(INITIAL_DIGITS);

    function makePathData(stroke, mapper = (p) => p) {
      if (!stroke || stroke.length === 0) return '';
      const start = mapper(stroke[0]);
      let d = `M ${start.x} ${start.y}`;
      for (let i = 1; i < stroke.length; i++) {
        const prev = stroke[i - 1];
        const curr = stroke[i];
        const cp1 = mapper(prev.hOut ? prev.hOut : prev);
        const cp2 = mapper(curr.hIn ? curr.hIn : curr);
        const end = mapper(curr);
        d += ` C ${cp1.x} ${cp1.y}, ${cp2.x} ${cp2.y}, ${end.x} ${end.y}`;
      }
      return d;
    }

    function createSvgElement(tag, attrs = {}) {
      const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
      for (const [k, v] of Object.entries(attrs)) {
        el.setAttribute(k, v);
      }
      return el;
    }

    const digitTabsContainer = document.getElementById('digit-tabs-container');
    const editorPathsG = document.getElementById('editor-paths');
    const editorControlsG = document.getElementById('editor-controls');

    function createDigitTabs() {
      digitTabsContainer.innerHTML = '';
      CONFIG.DIGIT_ORDER.forEach(num => {
        const btn = document.createElement('button');
        btn.className = `tab-btn py-2 text-sm font-bold rounded-lg border transition-all ${num === selectedDigit ? 'active' : 'bg-slate-50 hover:bg-slate-100 text-slate-700 border-slate-200'}`;
        btn.textContent = num;
        btn.addEventListener('click', () => {
          selectedDigit = num;
          document.querySelectorAll('.tab-btn').forEach(b => {
            const isActive = b.textContent === selectedDigit;
            b.className = `tab-btn py-2 text-sm font-bold rounded-lg border transition-all ${isActive ? 'active' : 'bg-slate-50 hover:bg-slate-100 text-slate-700 border-slate-200'}`;
          });
          renderEditor();
        });
        digitTabsContainer.appendChild(btn);
      });
    }

    function renderEditor() {
      editorPathsG.innerHTML = '';
      editorControlsG.innerHTML = '';

      const digitData = digits[selectedDigit];

      // パス描画
      digitData.strokes.forEach(stroke => {
        const d = makePathData(stroke);
        const outer = createSvgElement('path', { d, fill: 'none', stroke: '#e2e8f0', 'stroke-width': '10', 'stroke-linecap': 'round', 'stroke-linejoin': 'round' });
        const inner = createSvgElement('path', { d, fill: 'none', stroke: '#6366f1', 'stroke-width': '3', 'stroke-linecap': 'round', 'stroke-linejoin': 'round' });
        editorPathsG.appendChild(outer);
        editorPathsG.appendChild(inner);
      });

      // コントロールポイント描画
      digitData.strokes.forEach((stroke, sIdx) => {
        stroke.forEach((pt, pIdx) => {
          const anchor = createSvgElement('circle', { cx: pt.x, cy: pt.y, r: '4', fill: '#f43f5e', stroke: '#ffffff', 'stroke-width': '1.5', class: 'cursor-move' });
          anchor.addEventListener('mousedown', (e) => startDrag(e, sIdx, pIdx, 'anchor'));
          anchor.addEventListener('touchstart', (e) => startDrag(e, sIdx, pIdx, 'anchor'));
          editorControlsG.appendChild(anchor);

          if (pt.hIn && pIdx > 0) {
            const line = createSvgElement('line', { x1: pt.x, y1: pt.y, x2: pt.hIn.x, y2: pt.hIn.y, stroke: '#3b82f6', 'stroke-width': '0.8', 'stroke-dasharray': '2,2' });
            const ctrl = createSvgElement('circle', { cx: pt.hIn.x, cy: pt.hIn.y, r: '3', fill: '#ffffff', stroke: '#3b82f6', 'stroke-width': '1.5', class: 'cursor-move' });
            ctrl.addEventListener('mousedown', (e) => startDrag(e, sIdx, pIdx, 'hIn'));
            ctrl.addEventListener('touchstart', (e) => startDrag(e, sIdx, pIdx, 'hIn'));
            editorControlsG.appendChild(line);
            editorControlsG.appendChild(ctrl);
          }

          if (pt.hOut && pIdx < stroke.length - 1) {
            const line = createSvgElement('line', { x1: pt.x, y1: pt.y, x2: pt.hOut.x, y2: pt.hOut.y, stroke: '#10b981', 'stroke-width': '0.8', 'stroke-dasharray': '2,2' });
            const ctrl = createSvgElement('circle', { cx: pt.hOut.x, cy: pt.hOut.y, r: '3', fill: '#ffffff', stroke: '#10b981', 'stroke-width': '1.5', class: 'cursor-move' });
            ctrl.addEventListener('mousedown', (e) => startDrag(e, sIdx, pIdx, 'hOut'));
            ctrl.addEventListener('touchstart', (e) => startDrag(e, sIdx, pIdx, 'hOut'));
            editorControlsG.appendChild(line);
            editorControlsG.appendChild(ctrl);
          }
        });
      });

      // 新しい矢印スタイル (始点● + 濃い矢印➔) のエディタ描画
      if (digitData.arrows) {
        digitData.arrows.forEach((arr, aIdx) => {
          // 始点●
          const dot = createSvgElement('circle', {
            cx: arr.x, cy: arr.y, r: '3.5',
            fill: '#433f6c'
          });
          editorControlsG.appendChild(dot);

          // 矢印テキスト (濃い色)
          const arrowGroup = createSvgElement('g', {
            transform: `translate(${arr.x}, ${arr.y}) rotate(${arr.angle})`
          });
          const arrowText = createSvgElement('text', {
            x: '5', y: '0', 'font-size': '12', 'font-weight': 'bold', 'font-family': 'sans-serif',
            fill: '#433f6c', 'text-anchor': 'start', 'dominant-baseline': 'central',
            'pointer-events': 'none'
          });
          arrowText.textContent = '➔';
          arrowGroup.appendChild(arrowText);
          editorControlsG.appendChild(arrowGroup);

          // 位置指定ハンドル (黄色四角)
          const posH = createSvgElement('rect', {
            x: arr.x - 6, y: arr.y - 6, width: '12', height: '12',
            fill: 'rgba(234, 179, 8, 0.4)', stroke: '#ca8a04', 'stroke-width': '1.5', class: 'cursor-move'
          });
          posH.addEventListener('mousedown', (e) => startDrag(e, null, aIdx, 'arrowPos'));
          posH.addEventListener('touchstart', (e) => startDrag(e, null, aIdx, 'arrowPos'));
          editorControlsG.appendChild(posH);

          // 角度ハンドル (黄色丸)
          const dist = 18;
          const rad = arr.angle * Math.PI / 180;
          const ax = arr.x + Math.cos(rad) * dist;
          const ay = arr.y + Math.sin(rad) * dist;

          const angLine = createSvgElement('line', { x1: arr.x, y1: arr.y, x2: ax, y2: ay, stroke: '#ca8a04', 'stroke-width': '1.2' });
          const angH = createSvgElement('circle', { cx: ax, cy: ay, r: '4', fill: '#fef08a', stroke: '#ca8a04', 'stroke-width': '1.5', class: 'cursor-move' });
          angH.addEventListener('mousedown', (e) => startDrag(e, null, aIdx, 'arrowAngle'));
          angH.addEventListener('touchstart', (e) => startDrag(e, null, aIdx, 'arrowAngle'));
          editorControlsG.appendChild(angLine);
          editorControlsG.appendChild(angH);
        });
      }
    }

    function startDrag(e, strokeIdx, ptIdx, nodeType) {
      draggingInfo = { strokeIdx, ptIdx, nodeType };
      e.stopPropagation();
      e.preventDefault();
    }

    function onDrag(e) {
      if (!draggingInfo) return;

      const svg = document.getElementById('editor-svg');
      const rect = svg.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;

      let localX = Math.round(Math.max(5, Math.min(95, ((clientX - rect.left) / rect.width) * 100)));
      let localY = Math.round(Math.max(5, Math.min(95, ((clientY - rect.top) / rect.height) * 100)));

      const digitData = digits[selectedDigit];

      if (draggingInfo.nodeType.startsWith('arrow')) {
        const arr = digitData.arrows[draggingInfo.ptIdx];
        if (draggingInfo.nodeType === 'arrowPos') {
          arr.x = localX;
          arr.y = localY;
        } else if (draggingInfo.nodeType === 'arrowAngle') {
          const dx = localX - arr.x;
          const dy = localY - arr.y;
          arr.angle = Math.atan2(dy, dx) * (180 / Math.PI);
        }
      } else {
        const pt = digitData.strokes[draggingInfo.strokeIdx][draggingInfo.ptIdx];
        if (draggingInfo.nodeType === 'anchor') {
          const dx = localX - pt.x;
          const dy = localY - pt.y;
          pt.x = localX;
          pt.y = localY;
          if (pt.hIn) { pt.hIn.x += dx; pt.hIn.y += dy; }
          if (pt.hOut) { pt.hOut.x += dx; pt.hOut.y += dy; }
        } else if (draggingInfo.nodeType === 'hIn') {
          pt.hIn.x = localX; pt.hIn.y = localY;
        } else if (draggingInfo.nodeType === 'hOut') {
          pt.hOut.x = localX; pt.hOut.y = localY;
        }
      }

      renderEditor();
      renderWorksheet();
    }

    function endDrag() {
      draggingInfo = null;
    }

    window.addEventListener('mousemove', onDrag);
    window.addEventListener('mouseup', endDrag);
    window.addEventListener('touchmove', onDrag, { passive: false });
    window.addEventListener('touchend', endDrag);

    function renderWorksheet() {
      const headerGroup = document.getElementById('svg-header-group');
      const gridGroup = document.getElementById('svg-grid-group');
      headerGroup.innerHTML = '';
      gridGroup.innerHTML = '';

      // 1. ヘッダー描画
      const titleTxt = createSvgElement('text', { x: '120', y: '200', class: 'sheet-title' });
      titleTxt.textContent = CONFIG.TITLE;
      headerGroup.appendChild(titleTxt);

      const subtitleTxt = createSvgElement('text', { x: '120', y: '260', class: 'sheet-subtitle' });
      subtitleTxt.textContent = CONFIG.SUBTITLE;
      headerGroup.appendChild(subtitleTxt);

      const classTxt = createSvgElement('text', { x: '1350', y: '240', class: 'sheet-label' });
      classTxt.textContent = CONFIG.CLASS_LABEL;
      headerGroup.appendChild(classTxt);

      const nameTxt = createSvgElement('text', { x: '1800', y: '240', class: 'sheet-label' });
      nameTxt.textContent = CONFIG.NAME_LABEL;
      headerGroup.appendChild(nameTxt);

      const headerLine = createSvgElement('line', { x1: '120', y1: '310', x2: '2360', y2: '310', stroke: '#1e293b', 'stroke-width': '4' });
      headerGroup.appendChild(headerLine);

      // 2. グリッド＆文字データ描画
      // A4描画可能幅: 1868px (左右中央配置 X:306px)
      const gridLeft = 306;
      const gridWidth = 1868;
      let currentY = 340;

      LAYOUT_ROWS.forEach((rowConfig) => {
        const colsCount = rowConfig.digits.length;
        const cellWidth = gridWidth / colsCount;
        const cellHeight = cellWidth; // 正方形セル

        rowConfig.digits.forEach((digitChar, cIdx) => {
          const scale = rowConfig.scale || 1.0;
          const innerSize = cellWidth * scale;
          const offsetX = gridLeft + cIdx * cellWidth + (cellWidth - innerSize) / 2;
          const offsetY = currentY + (cellHeight - innerSize) / 2;
          const centerX = offsetX + innerSize / 2;
          const centerY = offsetY + innerSize / 2;

          // 青いセル枠線
          const borderRect = createSvgElement('rect', {
            x: offsetX, y: offsetY, width: innerSize, height: innerSize,
            fill: 'none', stroke: '#a4c2f4',
            'stroke-width': rowConfig.type === 'XL' ? '5' : '3'
          });
          gridGroup.appendChild(borderRect);

          // ガイド点線（十字線）
          const dashLen = 12 * scale;
          const hDash = createSvgElement('line', {
            x1: offsetX, y1: centerY, x2: offsetX + innerSize, y2: centerY,
            stroke: '#cbd5e1', 'stroke-width': '2', 'stroke-dasharray': `${dashLen},${dashLen}`
          });
          const vDash = createSvgElement('line', {
            x1: centerX, y1: offsetY, x2: centerX, y2: offsetY + innerSize,
            stroke: '#cbd5e1', 'stroke-width': '2', 'stroke-dasharray': `${dashLen},${dashLen}`
          });
          gridGroup.appendChild(hDash);
          gridGroup.appendChild(vDash);

          // なぞり文字データ
          if (!rowConfig.hideTrace) {


            const digitData = digits[digitChar];
            if (digitData && digitData.strokes) {
              const mapPt = (p) => ({
                x: offsetX + (p.x / 100) * innerSize,
                y: offsetY + (p.y / 100) * innerSize
              });

              const strokeGroup = createSvgElement('g', { opacity: CONFIG.UNIFIED_OPACITY });

              digitData.strokes.forEach(stroke => {
                const d = makePathData(stroke, mapPt);
                if (d) {
                  const strokePath = createSvgElement('path', {
                    d, fill: 'none', stroke: '#475569',
                    'stroke-width': (rowConfig.type === 'XL' ? 36 : 20) * (rowConfig.traceScale / 2),
                    'stroke-linecap': 'round', 'stroke-linejoin': 'round'
                  });
                  strokeGroup.appendChild(strokePath);
                }
              });
              gridGroup.appendChild(strokeGroup);

              // 書き順矢印 (始点● + 濃い色矢印➔)
              if (rowConfig.showArrow && digitData.arrows) {
                digitData.arrows.forEach(arr => {
                  const pt = mapPt(arr);

                  // 矢印用グループ
                  const arrowG = createSvgElement('g', {
                    transform: `translate(${pt.x}, ${pt.y}) rotate(${arr.angle})`
                  });

                  // 始点●
                  const dotRadius = rowConfig.type === 'XL' ? 15 : 12;
                  const dot = createSvgElement('circle', {
                    cx: '0', cy: '0', r: `${dotRadius * scale}`, fill: '#433f6c'
                  });
                  arrowG.appendChild(dot);

                  // 矢印テキスト ➔
                  const fontSize = rowConfig.type === 'XL' ? 50 : 40;
                  const offsetDistance = rowConfig.type === 'XL' ? 12 : 8;
                  const arrowText = createSvgElement('text', {
                    x: `${offsetDistance * scale}`, y: '0',
                    'font-size': `${fontSize * scale}`, 'font-weight': 'bold',
                    'font-family': 'sans-serif', fill: '#433f6c',
                    'text-anchor': 'start', 'dominant-baseline': 'central'
                  });
                  arrowText.textContent = '➔';
                  arrowG.appendChild(arrowText);

                  gridGroup.appendChild(arrowG);
                });
              }
            }
          }
        });

        currentY += cellHeight;
      });
    }

    function generateHighResPNG() {
      const svgEl = document.getElementById('worksheet-svg');
      const serializer = new XMLSerializer();
      let svgString = serializer.serializeToString(svgEl);

      if (!svgString.match(/^<svg[^>]+xmlns="http\:\/\/www\.w3\.org\/2000\/svg"/)) {
        svgString = svgString.replace(/^<svg/, '<svg xmlns="http://www.w3.org/2000/svg"');
      }

      const canvas = document.getElementById('export-canvas');
      canvas.width = 2480;
      canvas.height = 3508;
      const ctx = canvas.getContext('2d');

      const img = new Image();
      const svgBlob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(svgBlob);

      img.onload = function () {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);
        URL.revokeObjectURL(url);

        const dataURL = canvas.toDataURL('image/png');
        const downloadLink = document.createElement('a');
        downloadLink.href = dataURL;
        downloadLink.download = `${CONFIG.TITLE}_A4.png`;
        document.body.appendChild(downloadLink);
        downloadLink.click();
        document.body.removeChild(downloadLink);
      };
      img.src = url;
    }

    document.getElementById('reset-all-btn').addEventListener('click', () => {
      digits = structuredClone(INITIAL_DIGITS);
      renderEditor();
      renderWorksheet();
      showToast('編集した書体を初期状態にリセットしました！', '🔄');
    });

    document.getElementById('download-png-btn').addEventListener('click', () => {
      generateHighResPNG();
      showToast('練習シートのPNG画像を保存しました！', '💾');
    });

    document.getElementById('export-json-btn').addEventListener('click', () => {
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(digits, null, 2));
      const downloadAnchorNode = document.createElement('a');
      downloadAnchorNode.setAttribute("href", dataStr);
      downloadAnchorNode.setAttribute("download", "suuji_bezier_data.json");
      document.body.appendChild(downloadAnchorNode);
      downloadAnchorNode.click();
      downloadAnchorNode.remove();
      showToast('ベジェデータをエクスポートしました！', '📤');
    });

    document.getElementById('import-json-input').addEventListener('change', (event) => {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const importedData = JSON.parse(e.target.result);
          if (importedData['1'] && importedData['2']) {
            if (!importedData['=']) importedData['='] = structuredClone(INITIAL_DIGITS['=']);
            Object.keys(importedData).forEach(key => {
              if (importedData[key] && !importedData[key].arrows) {
                importedData[key].arrows = importedData[key].strokes.map(s => ({ x: s[0].x, y: s[0].y, angle: 0 }));
              }
            });
            digits = importedData;
            renderEditor();
            renderWorksheet();
            showToast('データを読み込みました！', '✅');
          } else {
            showToast('無効なデータ形式です。', '⚠️');
          }
        } catch (err) {
          showToast('ファイルの読み込みに失敗しました。', '⚠️');
        }
        event.target.value = '';
      };
      reader.readAsText(file);
    });

    function showToast(message, icon = '✨') {
      const toast = document.getElementById('toast-notification');
      const toastText = document.getElementById('toast-text');
      const toastIcon = document.getElementById('toast-icon');

      toastText.textContent = message;
      toastIcon.textContent = icon;

      toast.classList.remove('opacity-0', 'pointer-events-none');
      toast.classList.add('opacity-100');

      setTimeout(() => {
        toast.classList.remove('opacity-100');
        toast.classList.add('opacity-0', 'pointer-events-none');
      }, 3000);
    }

    window.onload = function () {
      createDigitTabs();
      renderEditor();
      renderWorksheet();
    };
  </script>
</body>
