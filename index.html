<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>すうじの練習帳メーカー (ベジェハンドル対応版)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'BIZ UDPGothic', 'Hiragino Sans', 'Meiryo', sans-serif;
      background-color: #f8fafc;
    }

    /* Beautiful paper ratio visualization on screen */
    .a4-preview-sheet {
      width: 100%;
      max-width: 800px;
      height: auto;
      aspect-ratio: 210 / 297; /* Ensure A4 portrait scale is strictly maintained */
      background-color: #ffffff;
      padding: 12mm 10mm;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      margin: 0 auto;
      box-sizing: border-box;
      position: relative;
    }

    .grid-table {
      width: 100%;
      height: 100%; /* Take full available height of the A4 container minus headers */
      border-collapse: collapse;
      table-layout: fixed;
    }

    .grid-table td {
      width: 10%;
      border: 1.2px solid #a4c2f4;
      position: relative;
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }

    /* Interactive editor styles */
    .editor-canvas-container {
      position: relative;
      width: 100%;
      max-width: 360px;
      aspect-ratio: 1 / 1;
      background-color: #ffffff;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
    }

    .tab-btn.active {
      background-color: #4f46e5;
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col text-slate-800">

  <header class="bg-indigo-900 text-white py-4 px-6 shadow-md">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
      <div class="flex items-center gap-3">
        <div class="bg-indigo-600 p-2.5 rounded-xl text-2xl shadow-inner">✍️</div>
        <div>
          <h1 class="text-xl font-bold tracking-wider">すうじの練習帳デザインスタジオ</h1>
          <p class="text-xs text-indigo-200 mt-0.5">ベジェハンドルを動かして理想のカタチを作り、高画質なA4練習シートをダウンロード</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <button id="reset-all-btn" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 active:scale-95 text-xs font-semibold rounded-lg transition-all border border-slate-700 flex items-center gap-1">
          🔄 編集した書体をリセット
        </button>
        <button id="download-png-btn" class="px-5 py-2.5 bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 active:scale-95 text-sm font-semibold rounded-lg shadow-lg shadow-emerald-900/20 transition-all flex items-center gap-2 text-white">
          💾 A4画像を保存する (PNG)
        </button>
      </div>
    </div>
  </header>

  <!-- Notification Banner for actions (replaces unsafe alerts/confirms) -->
  <div id="toast-notification" class="fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-slate-900/95 text-white text-xs px-4 py-2.5 rounded-xl shadow-xl border border-slate-700 opacity-0 pointer-events-none transition-all duration-300 flex items-center gap-2">
    <span id="toast-icon">✨</span>
    <span id="toast-text">設定を更新しました</span>
  </div>

  <main class="flex-1 max-w-7xl mx-auto w-full p-4 lg:p-6 flex flex-col lg:flex-row gap-6 items-start justify-center">
    
    <!-- Left Panel: Interactive Shape Editor -->
    <section class="w-full lg:w-[400px] bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex flex-col gap-5 shrink-0">
      <div>
        <h2 class="font-bold text-slate-900 text-base flex items-center gap-2 border-b pb-2 mb-3">
          <span class="text-indigo-600">🎨</span> 書体を編集する
        </h2>
        <p class="text-xs text-slate-500 leading-relaxed mb-4">
          数字のタブを選択し、エディタ上の大きな●（アンカー点）や、そこから伸びる線先の○（カーブの向きを調整するハンドル点）をドラッグして、なぞり線の丸みや長さを美しくデザインしてください。
        </p>
      </div>

      <!-- Digit tabs (0-9) -->
      <div class="grid grid-cols-5 gap-1.5" id="digit-tabs-container">
        <!-- Generated dynamically in JS -->
      </div>

      <!-- Active Interactive Canvas Editor -->
      <div class="flex justify-center my-1">
        <div class="editor-canvas-container">
          <svg id="editor-svg" viewBox="0 0 100 100" class="w-full h-full select-none cursor-default">
            <!-- Background grid inside editor -->
            <line x1="0" y1="50" x2="100" y2="50" stroke="#f1f5f9" stroke-width="1" />
            <line x1="50" y1="0" x2="50" y2="100" stroke="#f1f5f9" stroke-width="1" />
            <line x1="0" y1="50" x2="100" y2="50" stroke="#cbd5e1" stroke-width="0.8" stroke-dasharray="3,3" />
            <line x1="50" y1="0" x2="50" y2="100" stroke="#cbd5e1" stroke-width="0.8" stroke-dasharray="3,3" />
            
            <!-- Digital Paths render dynamically -->
            <g id="editor-paths"></g>
            <!-- UI nodes (anchors & handles) render dynamically -->
            <g id="editor-controls"></g>
          </svg>
        </div>
      </div>

      <div class="flex items-center justify-between border-t pt-4">
        <span class="text-xs text-slate-500">※ドラッグした形は右側の15段シートにリアルタイム自動同期します。</span>
      </div>

      <div class="flex items-center gap-2 mt-1 border-t pt-3">
        <button id="export-json-btn" class="flex-1 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-bold rounded-lg transition-all border border-slate-300 flex items-center justify-center gap-1">
          📤 データを保存
        </button>
        <label for="import-json-input" class="flex-1 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-bold rounded-lg transition-all border border-slate-300 flex items-center justify-center gap-1 cursor-pointer">
          📥 データを読込
        </label>
        <input type="file" id="import-json-input" accept=".json" class="hidden">
      </div>
    </section>

    <!-- Right Panel: A4 Preview and Sheet settings -->
    <section class="flex-1 w-full bg-slate-200/50 p-4 rounded-2xl flex justify-center items-start overflow-y-auto" style="min-height: 80vh;">
      
      <!-- A4 Sheet Visualization container -->
      <div class="a4-preview-sheet shadow-2xl flex flex-col">
        
        <!-- Sheet Header -->
        <div class="flex justify-between items-end border-b-2 border-slate-700 pb-2 mb-4 shrink-0" style="font-size: clamp(0.5rem, 1.5vw, 1rem);">
          <div>
            <h2 class="text-[1.5em] font-bold tracking-widest text-slate-800 font-sans leading-none">すうじの れんしゅうちょう</h2>
            <p class="text-[0.6em] text-slate-500 tracking-wider mt-1 font-semibold">ていねいに なぞって、きれいな すうじを かいてみよう！</p>
          </div>
          <!-- Name Section -->
          <div class="text-right text-slate-700 flex items-end gap-1 font-bold text-[0.8em]">
            <div>______ ねん ______ くみ</div>
            <div class="border-b border-slate-800 pb-0.5 px-4 w-[12em] text-left text-slate-400">なまえ（　　　　　　　　　　）</div>
          </div>
        </div>

        <!-- The 10x15 practice grid -->
        <div class="flex-1 flex flex-col">
          <table class="grid-table" id="worksheet-table">
            <!-- Rows and cols dynamically filled here -->
          </table>
        </div>
        
      </div>
    </section>

  </main>

  <!-- Hidden rendering canvas for downloading crisp high-res 300dpi-like image -->
  <canvas id="export-canvas" style="display: none;"></canvas>

  <script>
    // Deep clone helper function to handle complex nested objects cleanly without references
    function deepClone(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    // Default coordinate map designed specifically to align with the slanted handwritten style
    // Features the user's custom perfect bezier curves for all digits.

          ],
          [
            { "x": 48, "y": 16, "hOut": { "x": 48, "y": 16 } },
            { "x": 79, "y": 16, "hIn": { "x": 79, "y": 16 }, "hOut": { "x": 71, "y": 31 } },
            { "x": 42, "y": 82, "hIn": { "x": 42, "y": 82 } }
          ]
        ]
      },
      "8": {
        "strokes": [
          [
            { "x": 78, "y": 29, "hOut": { "x": 83, "y": 26 } },
            { "x": 44, "y": 47, "hIn": { "x": 51, "y": 40 }, "hOut": { "x": 25, "y": 56 } },
            { "x": 46, "y": 84, "hIn": { "x": 17, "y": 82 }, "hOut": { "x": 84, "y": 66 } },
            { "x": 40, "y": 22, "hIn": { "x": 34, "y": 37 }, "hOut": { "x": 48, "y": 8 } },
            { "x": 74, "y": 22, "hIn": { "x": 70, "y": 12 } }
          ]
        ]
      },
      "9": {
        "strokes": [
          [
            { "x": 71, "y": 23, "hOut": { "x": 71, "y": 19 } },
            { "x": 51, "y": 13, "hIn": { "x": 62, "y": 11 }, "hOut": { "x": 43, "y": 13 } },
            { "x": 34, "y": 30, "hIn": { "x": 34, "y": 20 }, "hOut": { "x": 34, "y": 40 } },
            { "x": 51, "y": 49, "hIn": { "x": 39, "y": 49 }, "hOut": { "x": 66, "y": 46 } },
            { "x": 72, "y": 30, "hIn": { "x": 73, "y": 31 }, "hOut": { "x": 81, "y": 26 } },
            { "x": 42, "y": 82, "hIn": { "x": 42, "y": 82 } }
          ]
        ]
      }
    };

    // Global Interactive State
    let digits = deepClone(INITIAL_DIGITS);
    let selectedDigit = '1';
    
    // Grid settings
    const digitOrder = ['1', '2', '3', '4', '5', '6', '7', '8', '9', '0'];
    const totalRows = 15;
    const fadeOpacities = [1.0, 0.65, 0.40, 0.20, 0.08]; // Decreasing stroke visibility for tracing practice

    // Helper to generate SVG Path String from a stroke data array
    function makePathData(stroke) {
      if (stroke.length === 0) return '';
      let d = `M ${stroke[0].x} ${stroke[0].y}`;
      for (let i = 1; i < stroke.length; i++) {
        const prev = stroke[i - 1];
        const curr = stroke[i];
        const cp1 = prev.hOut ? prev.hOut : { x: prev.x, y: prev.y };
        const cp2 = curr.hIn ? curr.hIn : { x: curr.x, y: curr.y };
        d += ` C ${cp1.x} ${cp1.y}, ${cp2.x} ${cp2.y}, ${curr.x} ${curr.y}`;
      }
      return d;
    }

    // Initialize UI controls and tabs
    const digitTabsContainer = document.getElementById('digit-tabs-container');
    const editorPathsG = document.getElementById('editor-paths');
    const editorControlsG = document.getElementById('editor-controls');
    const worksheetTable = document.getElementById('worksheet-table');
    const resetAllBtn = document.getElementById('reset-all-btn');
    const downloadPngBtn = document.getElementById('download-png-btn');
    const exportJsonBtn = document.getElementById('export-json-btn');
    const importJsonInput = document.getElementById('import-json-input');

    function createDigitTabs() {
      digitTabsContainer.innerHTML = '';
      digitOrder.forEach(num => {
        const btn = document.createElement('button');
        btn.className = `tab-btn py-2 text-sm font-bold rounded-lg border transition-all ${num === selectedDigit ? 'active' : 'bg-slate-50 hover:bg-slate-100 text-slate-700 border-slate-200'}`;
        btn.textContent = num;
        btn.addEventListener('click', () => {
          selectedDigit = num;
          document.querySelectorAll('.tab-btn').forEach(b => {
            b.classList.remove('active', 'bg-slate-50', 'hover:bg-slate-100', 'text-slate-700', 'border-slate-200');
            if (b.textContent === selectedDigit) {
              b.classList.add('active');
            } else {
              b.classList.add('bg-slate-50', 'hover:bg-slate-100', 'text-slate-700', 'border-slate-200');
            }
          });
          renderEditor();
        });
        digitTabsContainer.appendChild(btn);
      });
    }

    // Drag and drop state for nodes
    let draggingInfo = null; // { strokeIdx, ptIdx, nodeType } // nodeType: 'anchor' | 'hIn' | 'hOut'

    function renderEditor() {
      editorPathsG.innerHTML = '';
      editorControlsG.innerHTML = '';

      const digitData = digits[selectedDigit];

      // Draw trace line representing final state of the path in editor background
      digitData.strokes.forEach(stroke => {
        const d = makePathData(stroke);
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', d);
        path.setAttribute('fill', 'none');
        path.setAttribute('stroke', '#e2e8f0');
        path.setAttribute('stroke-width', '10');
        path.setAttribute('stroke-linecap', 'round');
        path.setAttribute('stroke-linejoin', 'round');
        editorPathsG.appendChild(path);

        const innerPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        innerPath.setAttribute('d', d);
        innerPath.setAttribute('fill', 'none');
        innerPath.setAttribute('stroke', '#6366f1');
        innerPath.setAttribute('stroke-width', '3');
        innerPath.setAttribute('stroke-linecap', 'round');
        innerPath.setAttribute('stroke-linejoin', 'round');
        editorPathsG.appendChild(innerPath);
      });

      // Render Interactive Anchors and Handles
      digitData.strokes.forEach((stroke, sIdx) => {
        stroke.forEach((pt, pIdx) => {
          // 1. Draw Anchor Point
          const anchor = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          anchor.setAttribute('cx', pt.x);
          anchor.setAttribute('cy', pt.y);
          anchor.setAttribute('r', '4');
          anchor.setAttribute('fill', '#f43f5e'); // Vibrant Rose-500
          anchor.setAttribute('stroke', '#ffffff');
          anchor.setAttribute('stroke-width', '1.5');
          anchor.setAttribute('class', 'cursor-move');
          anchor.addEventListener('mousedown', (e) => startDrag(e, sIdx, pIdx, 'anchor'));
          anchor.addEventListener('touchstart', (e) => startDrag(e, sIdx, pIdx, 'anchor'));
          editorControlsG.appendChild(anchor);

          // 2. Draw Handle IN (incoming control node)
          if (pt.hIn && pIdx > 0) {
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', pt.x);
            line.setAttribute('y1', pt.y);
            line.setAttribute('x2', pt.hIn.x);
            line.setAttribute('y2', pt.hIn.y);
            line.setAttribute('stroke', '#3b82f6'); // Sky-500
            line.setAttribute('stroke-width', '0.8');
            line.setAttribute('stroke-dasharray', '2,2');
            editorControlsG.appendChild(line);

            const ctrl = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            ctrl.setAttribute('cx', pt.hIn.x);
            ctrl.setAttribute('cy', pt.hIn.y);
            ctrl.setAttribute('r', '3');
            ctrl.setAttribute('fill', '#ffffff');
            ctrl.setAttribute('stroke', '#3b82f6');
            ctrl.setAttribute('stroke-width', '1.5');
            ctrl.setAttribute('class', 'cursor-move');
            ctrl.addEventListener('mousedown', (e) => startDrag(e, sIdx, pIdx, 'hIn'));
            ctrl.addEventListener('touchstart', (e) => startDrag(e, sIdx, pIdx, 'hIn'));
            editorControlsG.appendChild(ctrl);
          }

          // 3. Draw Handle OUT (outgoing control node)
          if (pt.hOut && pIdx < stroke.length - 1) {
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', pt.x);
            line.setAttribute('y1', pt.y);
            line.setAttribute('x2', pt.hOut.x);
            line.setAttribute('y2', pt.hOut.y);
            line.setAttribute('stroke', '#10b981'); // Emerald-500
            line.setAttribute('stroke-width', '0.8');
            line.setAttribute('stroke-dasharray', '2,2');
            editorControlsG.appendChild(line);

            const ctrl = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            ctrl.setAttribute('cx', pt.hOut.x);
            ctrl.setAttribute('cy', pt.hOut.y);
            ctrl.setAttribute('r', '3');
            ctrl.setAttribute('fill', '#ffffff');
            ctrl.setAttribute('stroke', '#10b981');
            ctrl.setAttribute('stroke-width', '1.5');
            ctrl.setAttribute('class', 'cursor-move');
            ctrl.addEventListener('mousedown', (e) => startDrag(e, sIdx, pIdx, 'hOut'));
            ctrl.addEventListener('touchstart', (e) => startDrag(e, sIdx, pIdx, 'hOut'));
            editorControlsG.appendChild(ctrl);
          }
        });
      });
    }

    function startDrag(e, strokeIdx, ptIdx, nodeType) {
      draggingInfo = { strokeIdx, ptIdx, nodeType };
      e.stopPropagation();
      e.preventDefault();
    }

    function onDrag(e) {
      if (!draggingInfo) return;

      const svg = document.getElementById('editor-svg');
      const rect = svg.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;

      let localX = ((clientX - rect.left) / rect.width) * 100;
      let localY = ((clientY - rect.top) / rect.height) * 100;

      localX = Math.round(Math.max(5, Math.min(95, localX)));
      localY = Math.round(Math.max(5, Math.min(95, localY)));

      const digitData = digits[selectedDigit];
      const pt = digitData.strokes[draggingInfo.strokeIdx][draggingInfo.ptIdx];

      if (draggingInfo.nodeType === 'anchor') {
        const dx = localX - pt.x;
        const dy = localY - pt.y;
        pt.x = localX;
        pt.y = localY;
        if (pt.hIn) { pt.hIn.x += dx; pt.hIn.y += dy; }
        if (pt.hOut) { pt.hOut.x += dx; pt.hOut.y += dy; }
      } else if (draggingInfo.nodeType === 'hIn') {
        pt.hIn.x = localX;
        pt.hIn.y = localY;
      } else if (draggingInfo.nodeType === 'hOut') {
        pt.hOut.x = localX;
        pt.hOut.y = localY;
      }

      renderEditor();
      renderWorksheet();
    }

    function endDrag() {
      draggingInfo = null;
    }

    window.addEventListener('mousemove', onDrag);
    window.addEventListener('mouseup', endDrag);
    window.addEventListener('touchmove', onDrag, { passive: false });
    window.addEventListener('touchend', endDrag);

    // Generates the worksheet table inside A4 preview block dynamically
    function renderWorksheet() {
      worksheetTable.innerHTML = '';

      for (let r = 0; r < totalRows; r++) {
        const tr = document.createElement('tr');

        digitOrder.forEach(num => {
          const td = document.createElement('td');
          const container = document.createElement('div');
          container.className = 'w-full h-full flex justify-center items-center';

          const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
          svg.setAttribute('viewBox', '0 0 100 100');
          svg.style.width = '100%';
          svg.style.height = '100%';
          svg.style.display = 'block';

          // Light blue standard school layout grids
          const hLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          hLine.setAttribute('x1', '0'); hLine.setAttribute('y1', '50'); hLine.setAttribute('x2', '100'); hLine.setAttribute('y2', '50');
          hLine.setAttribute('stroke', '#cbd5e1'); hLine.setAttribute('stroke-width', '0.6'); hLine.setAttribute('stroke-dasharray', '2,2');
          svg.appendChild(hLine);

          const vLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          vLine.setAttribute('x1', '50'); vLine.setAttribute('y1', '0'); vLine.setAttribute('x2', '50'); vLine.setAttribute('y2', '100');
          vLine.setAttribute('stroke', '#cbd5e1'); vLine.setAttribute('stroke-width', '0.6'); vLine.setAttribute('stroke-dasharray', '2,2');
          svg.appendChild(vLine);

          // Rows 1-5 have actual customizable tracing strokes with decreasing opacity
          if (r < 5) {
            const opacity = fadeOpacities[r];
            const dData = digits[num];

            dData.strokes.forEach(stroke => {
              const strokePath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
              strokePath.setAttribute('d', makePathData(stroke));
              strokePath.setAttribute('fill', 'none');
              strokePath.setAttribute('stroke', '#475569'); // Bold tracing slate color
              strokePath.setAttribute('stroke-width', '7');
              strokePath.setAttribute('stroke-linecap', 'round');
              strokePath.setAttribute('stroke-linejoin', 'round');
              strokePath.setAttribute('opacity', opacity);
              svg.appendChild(strokePath);
            });
          }

          container.appendChild(svg);
          td.appendChild(container);
          tr.appendChild(td);
        });

        worksheetTable.appendChild(tr);
      }
    }

    // Draws exact high-fidelity worksheet design to hidden HTML5 Canvas, allowing perfect 1:1 local printing
    function generateHighResPNG() {
      const canvas = document.getElementById('export-canvas');
      const ctx = canvas.getContext('2d');

      // A4 exact high resolution dimension standard (300 DPI layout equivalent)
      const canvasWidth = 2480;
      const canvasHeight = 3508;
      canvas.width = canvasWidth;
      canvas.height = canvasHeight;

      // 1. Draw Paper Base
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvasWidth, canvasHeight);

      // 2. Draw Header block
      ctx.fillStyle = '#1e293b';
      ctx.font = 'bold 85px "BIZ UDPGothic", "Hiragino Sans", "Meiryo", sans-serif';
      ctx.fillText('すうじの れんしゅうちょう', 120, 200);

      ctx.fillStyle = '#64748b';
      ctx.font = 'bold 32px "BIZ UDPGothic", "Hiragino Sans", sans-serif';
      ctx.fillText('ていねいに なぞって、きれいな すうじを かいてみよう！', 120, 260);

      // Name / Class box line
      ctx.fillStyle = '#334155';
      ctx.font = 'bold 36px "BIZ UDPGothic", sans-serif';
      ctx.fillText('______ ねん ______ くみ', 1350, 240);
      ctx.fillStyle = '#94a3b8';
      ctx.fillText('なまえ（　　　　　　　　　　　　　　　）', 1800, 240);
      ctx.beginPath();
      ctx.strokeStyle = '#1e293b';
      ctx.lineWidth = 4;
      ctx.moveTo(120, 310);
      ctx.lineTo(2360, 310);
      ctx.stroke();

      // Grid settings for A4 10 cols x 15 rows
      const gridLeft = 120;
      const gridTop = 360;
      const gridWidth = 2240;
      const gridHeight = 2980;
      const colWidth = gridWidth / 10;
      const rowHeight = gridHeight / totalRows;

      // 3. Draw grid system
      for (let r = 0; r <= totalRows; r++) {
        ctx.beginPath();
        ctx.strokeStyle = '#a4c2f4'; // Standard blue grid lines
        ctx.lineWidth = (r === 0 || r === totalRows) ? 5 : 3;
        ctx.moveTo(gridLeft, gridTop + r * rowHeight);
        ctx.lineTo(gridLeft + gridWidth, gridTop + r * rowHeight);
        ctx.stroke();
      }

      for (let c = 0; c <= 10; c++) {
        ctx.beginPath();
        ctx.strokeStyle = '#a4c2f4';
        ctx.lineWidth = (c === 0 || c === 10) ? 5 : 3;
        ctx.moveTo(gridLeft + c * colWidth, gridTop);
        ctx.lineTo(gridLeft + c * colWidth, gridTop + gridHeight);
        ctx.stroke();
      }

      // 4. Draw Leader/crosshair dash lines and Digit curves inside every block
      for (let r = 0; r < totalRows; r++) {
        for (let c = 0; c < 10; c++) {
          const cellX = gridLeft + c * colWidth;
          const cellY = gridTop + r * rowHeight;
          const centerX = cellX + colWidth / 2;
          const centerY = cellY + rowHeight / 2;

          // Crosshairs
          ctx.beginPath();
          ctx.strokeStyle = '#cbd5e1';
          ctx.lineWidth = 2;
          ctx.setLineDash([12, 12]);
          ctx.moveTo(cellX, centerY);
          ctx.lineTo(cellX + colWidth, centerY);
          ctx.moveTo(centerX, cellY);
          ctx.lineTo(centerX, cellY + rowHeight);
          ctx.stroke();
          ctx.setLineDash([]); // Reset dash

          // Tracing guide lines (First 5 rows only)
          if (r < 5) {
            const digitChar = digitOrder[c];
            const digitData = digits[digitChar];
            const opacity = fadeOpacities[r];

            ctx.save();
            ctx.globalAlpha = opacity;
            ctx.strokeStyle = '#475569'; // Bold tracing slate color
            ctx.lineWidth = 15; // Brush thickness
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            digitData.strokes.forEach(stroke => {
              if (stroke.length === 0) return;
              ctx.beginPath();

              const mapPt = (p) => ({
                x: cellX + (p.x / 100) * colWidth,
                y: cellY + (p.y / 100) * rowHeight
              });

              const startPt = mapPt(stroke[0]);
              ctx.moveTo(startPt.x, startPt.y);

              for (let i = 1; i < stroke.length; i++) {
                const prev = stroke[i - 1];
                const curr = stroke[i];
                const cp1 = mapPt(prev.hOut ? prev.hOut : { x: prev.x, y: prev.y });
                const cp2 = mapPt(curr.hIn ? curr.hIn : { x: curr.x, y: curr.y });
                const end = mapPt(curr);

                ctx.bezierCurveTo(cp1.x, cp1.y, cp2.x, cp2.y, end.x, end.y);
              }
              ctx.stroke();
            });
            ctx.restore();
          }
        }
      }

      // Convert buffer data to downloadable PNG file attachment link
      const dataURL = canvas.toDataURL('image/png');
      const downloadLink = document.createElement('a');
      downloadLink.href = dataURL;
      downloadLink.download = 'すうじのれんしゅうちょう_A4.png';
      document.body.appendChild(downloadLink);
      downloadLink.click();
      document.body.removeChild(downloadLink);
    }

    // UI Event Handlers
    resetAllBtn.addEventListener('click', () => {
      if (confirm('すべての数字の形を初期形にリセットしますか？')) {
        digits = deepClone(INITIAL_DIGITS);
        renderEditor();
        renderWorksheet();
      }
    });

    downloadPngBtn.addEventListener('click', () => {
      generateHighResPNG();
    });

    exportJsonBtn.addEventListener('click', () => {
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(digits, null, 2));
      const downloadAnchorNode = document.createElement('a');
      downloadAnchorNode.setAttribute("href", dataStr);
      downloadAnchorNode.setAttribute("download", "suuji_bezier_data.json");
      document.body.appendChild(downloadAnchorNode);
      downloadAnchorNode.click();
      downloadAnchorNode.remove();
    });

    importJsonInput.addEventListener('change', (event) => {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const importedData = JSON.parse(e.target.result);
          if (importedData['1'] && importedData['2']) {
            digits = importedData;
            renderEditor();
            renderWorksheet();
            showToast('📥 データを読み込みました！', '✅');
          } else {
            showToast('無効なデータ形式です。', '⚠️');
          }
        } catch (err) {
          showToast('ファイルの読み込みに失敗しました。', '⚠️');
        }
        importJsonInput.value = ''; // Reset input
      };
      reader.readAsText(file);
    });

    // Safe Non-blocking Custom Notification Toast
    function showToast(message, icon = '✨') {
      const toast = document.getElementById('toast-notification');
      const toastText = document.getElementById('toast-text');
      const toastIcon = document.getElementById('toast-icon');
      
      toastText.textContent = message;
      toastIcon.textContent = icon;
      
      toast.classList.remove('opacity-0', 'pointer-events-none');
      toast.classList.add('opacity-100');
      
      setTimeout(() => {
        toast.classList.remove('opacity-100');
        toast.classList.add('opacity-0', 'pointer-events-none');
      }, 3000);
    }

    // UI Event Handlers
    resetAllBtn.addEventListener('click', () => {
      // Replaced unsafe confirm() with instant safe reset + custom toast notification
      digits = deepClone(INITIAL_DIGITS);
      renderEditor();
      renderWorksheet();
      showToast('編集した書体を初期状態にリセットしました！', '🔄');
    });

    downloadPngBtn.addEventListener('click', () => {
      generateHighResPNG();
      showToast('練習シートのPNG画像を保存しました！', '💾');
    });

    exportJsonBtn.addEventListener('click', () => {
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(digits, null, 2));
      const downloadAnchorNode = document.createElement('a');
      downloadAnchorNode.setAttribute("href", dataStr);
      downloadAnchorNode.setAttribute("download", "suuji_bezier_data.json");
      document.body.appendChild(downloadAnchorNode);
      downloadAnchorNode.click();
      downloadAnchorNode.remove();
      showToast('ベジェデータをエクスポートしました！', '📤');
    });

    // Bootstrapping
    window.onload = function() {
      createDigitTabs();
      renderEditor();
      renderWorksheet();
    };
  </script>
</body>
